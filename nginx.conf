worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;

        location / {
            # Указываем твой сервер Marzban (порт 80, так как там настроен VLESS WS)
            proxy_pass http://18.197.206.187:80;
            
            # Настройки для правильного проксирования WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Передаем реальные IP-адреса клиентов до Marzban
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Увеличиваем таймауты для стабильных VLESS-соединений (1 час)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
